name: CI

permissions:
  contents: write # semantic-release pushes the version commit, tag and changelog
  issues: write # semantic-release comments on released issues/PRs
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm (no NPM_TOKEN) + provenance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to compute the version
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 26 bundles npm 11.17+, which OIDC needs (>= 11.5.1)
          cache: pnpm
          # Do NOT set registry-url here: it writes an .npmrc that conflicts
          # with semantic-release's own OIDC auth.
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Release 🚀
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 25 # v25 bundles @semantic-release/npm v13, which does OIDC
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          # No NPM_TOKEN: publishing authenticates via OIDC (id-token: write above).
          # Requires a trusted publisher configured for @zamanapp/basma on npmjs.com.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
